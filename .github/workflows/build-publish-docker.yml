name: Build & Publish Docker image

# Publishes a multi-arch image for a given Pinakes release.
# Triggers:
#   - repository_dispatch (pinakes_release): fired by Pinakes' create-release.sh
#   - workflow_dispatch: manual, with a version input
#   - push of a v* tag in this repo
on:
  repository_dispatch:
    types: [pinakes_release]
  workflow_dispatch:
    inputs:
      version:
        description: "Pinakes version to build (e.g. 0.7.22)"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write   # GHCR push via the built-in GITHUB_TOKEN

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target version
        id: ver
        # Untrusted inputs (client_payload from repository_dispatch, ref name)
        # enter ONLY via env vars, never inlined into the script, and are
        # validated against a strict regex before anything downstream uses them.
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_VERSION: ${{ github.event.client_payload.pinakes_version }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "$EVENT_NAME" in
            repository_dispatch) v="$DISPATCH_VERSION" ;;
            workflow_dispatch)   v="$INPUT_VERSION" ;;
            *)                   v="${REF_NAME#v}" ;;
          esac
          v="${v#v}"
          if ! printf '%s' "$v" | grep -qE '^[0-9]+\.[0-9]+(\.[0-9]+){0,2}(-[A-Za-z0-9.]+)?$'; then
            echo "::error::Invalid version (rejected untrusted input)"; exit 1
          fi
          echo "Resolved version: $v"
          echo "version=$v" >>"$GITHUB_OUTPUT"

      - name: Verify the Pinakes release ZIP exists
        # VERSION is already regex-validated (digits/dots/hyphen/alnum only).
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          url="https://github.com/fabiodalez-dev/Pinakes/releases/download/v${VERSION}/pinakes-v${VERSION}.zip"
          echo "Checking $url"
          code=$(curl -sSL -o /dev/null -w '%{http_code}' -r 0-0 "$url" || echo 000)
          if [ "$code" != "206" ] && [ "$code" != "200" ]; then
            echo "::error::Release ZIP not found (HTTP $code) for v${VERSION}"; exit 1
          fi

      - name: Decide Docker Hub availability
        id: cfg
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          ghcr="ghcr.io/${GITHUB_REPOSITORY,,}"
          imgs="$ghcr"
          if [ -n "$DH_USER" ] && [ -n "$DH_TOKEN" ]; then
            echo "dockerhub=true" >>"$GITHUB_OUTPUT"
            imgs="$imgs"$'\n'"docker.io/${DH_USER}/pinakes"
          else
            echo "dockerhub=false" >>"$GITHUB_OUTPUT"
            echo "::notice::Docker Hub secrets absent — publishing to GHCR only."
          fi
          { echo "images<<EOF"; echo "$imgs"; echo "EOF"; } >>"$GITHUB_OUTPUT"

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.cfg.outputs.images }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(steps.ver.outputs.version, '-') }}
          labels: |
            org.opencontainers.image.title=Pinakes ILS
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.cfg.outputs.dockerhub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PINAKES_VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Published Pinakes Docker image \`${{ steps.ver.outputs.version }}\`" >>"$GITHUB_STEP_SUMMARY"
          echo '```' >>"$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >>"$GITHUB_STEP_SUMMARY"
          echo '```' >>"$GITHUB_STEP_SUMMARY"
