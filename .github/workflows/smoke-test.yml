name: Smoke test

# Builds the image and runs the full headless-install smoke test on the GitHub
# runner's Docker, so we never publish an image that can't actually serve.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read target Pinakes version
        id: ver
        run: |
          v="$(cat .latest-pinakes-version 2>/dev/null | tr -d '[:space:]' || echo 0.7.22)"
          echo "version=$v" >>"$GITHUB_OUTPUT"

      - name: Run Docker smoke test
        env:
          PINAKES_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          chmod +x tests/docker-smoke.sh
          tests/docker-smoke.sh
