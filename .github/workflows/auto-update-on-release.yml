name: Auto-update on Pinakes release

# Keeps the image in lock-step with upstream Pinakes releases.
#   - Primary path: Pinakes' create-release.sh fires a repository_dispatch
#     (pinakes_release) the moment a release is published -> build-publish-docker
#     builds immediately and this workflow records the version.
#   - Safety net: a daily cron polls the Pinakes "latest release" API; if a newer
#     version exists than the committed marker, it records it and triggers a build.
on:
  repository_dispatch:
    types: [pinakes_release]
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write   # commit the version marker
  actions: write    # trigger build-publish-docker on cron-detected updates

concurrency:
  group: auto-update
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve latest upstream version
        id: latest
        # client_payload is attacker-controllable on repository_dispatch — it
        # enters via env only and is regex-validated before any use.
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_VERSION: ${{ github.event.client_payload.pinakes_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            v="$DISPATCH_VERSION"
          else
            v="$(gh api repos/fabiodalez-dev/Pinakes/releases/latest --jq .tag_name)"
          fi
          v="${v#v}"
          if ! printf '%s' "$v" | grep -qE '^[0-9]+\.[0-9]+(\.[0-9]+){0,2}$'; then
            echo "::error::Invalid/empty upstream version (rejected)"; exit 1
          fi
          echo "version=$v" >>"$GITHUB_OUTPUT"

      - name: Compare with committed marker
        id: cmp
        env:
          LATEST: ${{ steps.latest.outputs.version }}
        run: |
          current="$(cat .latest-pinakes-version 2>/dev/null | tr -d '[:space:]' || true)"
          echo "current=$current  latest=$LATEST"
          if [ "$current" != "$LATEST" ]; then
            echo "changed=true" >>"$GITHUB_OUTPUT"
          else
            echo "changed=false" >>"$GITHUB_OUTPUT"
            echo "Already up to date."
          fi

      - name: Record new version
        if: steps.cmp.outputs.changed == 'true'
        env:
          LATEST: ${{ steps.latest.outputs.version }}
        run: |
          printf '%s\n' "$LATEST" > .latest-pinakes-version
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .latest-pinakes-version
          git commit -m "chore: track Pinakes v${LATEST}"
          git push

      - name: Trigger build (cron/manual path only)
        # On repository_dispatch the build-publish workflow already fired on the
        # same event, so we only kick a build when the poller found a new version.
        if: steps.cmp.outputs.changed == 'true' && github.event_name != 'repository_dispatch'
        env:
          LATEST: ${{ steps.latest.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run build-publish-docker.yml -f version="$LATEST"
