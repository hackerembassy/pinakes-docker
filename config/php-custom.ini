; Pinakes production PHP settings (loaded as zz-pinakes.ini, last wins).

; Uploads & request bodies — Pinakes ships ePub/MP3/PDF digital assets and a
; ~30 MB admin-UI upgrade ZIP. post_max_size must be >= upload_max_filesize.
upload_max_filesize = 512M
post_max_size = 520M
max_file_uploads = 30

; Execution — large ZIP extraction during in-app updates.
memory_limit = 256M
max_execution_time = 600
max_input_time = 600
max_input_vars = 5000

; Security hardening for production.
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
allow_url_fopen = On
allow_url_include = Off

; Sessions — stored under the writable storage volume (set at runtime too).
session.cookie_httponly = 1
session.use_strict_mode = 1
session.gc_maxlifetime = 3600

; OPcache — validate_timestamps=1 so the in-app self-updater's new files are
; picked up without a container restart (revalidate every 2s).
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2

; Timezone — overridable via PHP_TZ-style env if needed.
date.timezone = UTC
