<VirtualHost *:80>
    ServerName localhost

    # Clean docroot = the app's public/ dir. The Slim front controller and the
    # shipped public/.htaccess (mod_rewrite) handle all routing.
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        # Pinakes relies on its .htaccess (rewrite rules, security headers).
        AllowOverride All
        Require all granted
    </Directory>

    # Never serve the application internals (defence in depth; the app dir is
    # outside DocumentRoot already, this blocks symlink/alias surprises).
    <DirectoryMatch "^/var/www/html/(app|config|installer|storage|vendor|cron|bin)">
        Require all denied
    </DirectoryMatch>

    # Honour reverse-proxy TLS termination so FORCE_HTTPS / secure cookies work.
    SetEnvIf X-Forwarded-Proto "https" HTTPS=on

    LogLevel warn
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
